name: Check Source Updates

on:
  schedule:
    - cron: "0 7 * * 1"
  workflow_dispatch:

concurrency:
  group: check-source-updates-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-source-updates:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "25"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build dataset
        run: npm run ingest

      - name: Source health verification
        run: npm run check:source-updates

      - name: Data quality gate
        run: npm run check:data
